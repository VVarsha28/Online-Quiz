<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;

            /* 🔥 Animation added */
            animation: fadeIn 1s ease-in;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            width: 220px;
            margin: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            transition: 0.3s;
        }

        /* ✨ Input focus effect */
        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0px 0px 5px rgba(79,172,254,0.5);
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* ✨ Button hover effect */
        button:hover {
            background: #007bff;
            transform: scale(1.05);
        }

        /* 🔥 Fade-in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Online Quiz</h2>
    <form method="POST">
        <input type="text" name="name" placeholder="Enter your name" required><br>
        <button type="submit">Start Quiz</button>
    </form>
</div>

</body>
</html>
