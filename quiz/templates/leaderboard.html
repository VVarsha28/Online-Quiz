<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }
        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
            background: white;
        }
        th, td {
            padding: 12px;
            border: 1px solid #ddd;
        }
        th {
            background: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background: #f2f2f2;
        }
    </style>
</head>
<body>

<h2>Leaderboard</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Score</th>
    </tr>

    {% if data %}
        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
        </tr>
        {% endfor %}
    {% else %}
        <tr>
            <td colspan="3">No data available</td>
        </tr>
    {% endif %}

</table>

<br>
<a href="/">Back to Home</a>

</body>
</html>
